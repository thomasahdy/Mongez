name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mongez_test
        options: --health-cmd pg_isready --health-interval 10s
      redis:
        image: redis:7-alpine
        options: --health-cmd "redis-cli ping"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/mongez/package-lock.json

      - run: npm ci
        working-directory: backend/mongez

      - run: npm run lint
        working-directory: backend/mongez

      - run: npx tsc --noEmit
        working-directory: backend/mongez

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: backend/mongez
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mongez_test

      - run: npm run test -- --coverage
        working-directory: backend/mongez
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mongez_test
          REDIS_URL: redis://localhost:6379

      - name: Run Backend Integration Tests
        run: npm run test:integration
        working-directory: backend/mongez

  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ai-service/pyproject.toml'
      - name: Install dependencies
        run: |
          cd ai-service
          pip install -e .[dev]
      - name: Run pytest
        run: |
          cd ai-service
          pytest

